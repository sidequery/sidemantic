name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      new_version: ${{ steps.version.outputs.new_version }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check core import without DAX extra
        run: |
          uv run python - <<'PY'
          import sys

          from sidemantic import Dimension, Metric, Model

          assert Model.__name__ == "Model"
          assert Dimension.__name__ == "Dimension"
          assert Metric.__name__ == "Metric"
          assert "sidemantic_dax" not in sys.modules
          PY

      - name: Install DAX dependencies
        run: uv sync --extra dev --extra dax

      - name: Install browser test runtime
        run: uv run python -m playwright install --with-deps chromium

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update version in pyproject.toml, DAX package, and __init__.py
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          uv run --no-project python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["NEW_VERSION"]

          version_files = (
              Path("pyproject.toml"),
              Path("crates/dax-pyo3/pyproject.toml"),
              Path("crates/dax-pyo3/Cargo.toml"),
          )
          for path in version_files:
              lines = path.read_text().splitlines()
              path.write_text(
                  "\n".join(
                      f'version = "{version}"' if line.startswith("version = ") else line
                      for line in lines
                  )
                  + "\n"
              )

          init_path = Path("sidemantic/__init__.py")
          init_lines = init_path.read_text().splitlines()
          init_path.write_text(
              "\n".join(
                  f'__version__ = "{version}"' if line.startswith("__version__ = ") else line
                  for line in init_lines
              )
              + "\n"
          )

          pyproject_path = Path("pyproject.toml")
          pyproject_lines = pyproject_path.read_text().splitlines()
          pyproject_path.write_text(
              "\n".join(
                  f'    "sidemantic-dax>={version}",' if line.strip().startswith('"sidemantic-dax>=')
                  else line
                  for line in pyproject_lines
              )
              + "\n"
          )
          PY
          echo "Updated version to $NEW_VERSION"

      - name: Update lock files
        run: |
          cargo generate-lockfile
          uv lock

      - name: Validate release tree
        run: |
          uv run ruff check . --exclude docs/_extensions --exclude sidemantic-duckdb/extension-ci-tools --exclude sidemantic-duckdb/scripts --exclude sidemantic-duckdb/duckdb --exclude sidemantic/adapters/malloy_grammar --exclude sidemantic/adapters/holistics_grammar
          uv run ruff format --check . --exclude docs/_extensions --exclude sidemantic-duckdb/extension-ci-tools --exclude sidemantic-duckdb/scripts --exclude sidemantic-duckdb/duckdb --exclude sidemantic/adapters/malloy_grammar --exclude sidemantic/adapters/holistics_grammar
          uv run mypy
          uv run pytest -v
          uv run python scripts/build_widget.py --check
          uv run python scripts/build_webapp.py --check
          uv run python scripts/build_ui_distribution.py --check

      - name: Build packages
        run: |
          uv build crates/dax-pyo3 --sdist --out-dir dist
          uv build --out-dir dist
          unzip -l "$(find dist -name 'sidemantic-[0-9]*.whl' -print -quit)" | grep -q 'sidemantic/py.typed'

      - name: Run installed-wheel DAX smoke
        run: |
          DIST_DIR=$(realpath dist)
          SIDEMANTIC_WHEEL=$(realpath "$(find dist -name 'sidemantic-[0-9]*.whl' -print -quit)")
          cd /tmp
          uv run --no-project --find-links "${DIST_DIR}" --with "${SIDEMANTIC_WHEEL}[dax]" -- python - <<'PY'
          import sidemantic_dax

          sidemantic_dax.parse_expression("1")
          PY

      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml sidemantic/__init__.py crates/dax-pyo3/pyproject.toml crates/dax-pyo3/Cargo.toml Cargo.lock uv.lock
          git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Upload sdist and sidemantic wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-base
          path: dist/*
          if-no-files-found: error

  build-dax-wheels:
    name: Build sidemantic-dax wheel (${{ matrix.target }})
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path crates/dax-pyo3/Cargo.toml --out crates/dax-pyo3/dist
          manylinux: auto
          target: ${{ matrix.target }}

      - name: Upload abi3 wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-dax-${{ matrix.os }}-${{ matrix.target }}
          path: crates/dax-pyo3/dist/*.whl
          if-no-files-found: error

  release:
    name: Publish to PyPI and create release
    needs:
      - publish
      - build-dax-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/* --token $UV_PUBLISH_TOKEN

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.publish.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.publish.outputs.tag }}" \
            --generate-notes
