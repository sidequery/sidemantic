<style>
*, ::before, ::after {
  box-sizing: border-box;
  border-width: 0;
  border-style: solid;
}
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
#chart-root {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
#chart-root .vega-embed,
#chart-root .vega-embed > div,
#chart-root .vega-embed canvas,
#chart-root .vega-embed svg {
  overflow: hidden !important;
}
#chart-root .vega-actions {
  overflow: visible;
}
.error {
  padding: 2rem;
  text-align: center;
  color: #dc2626;
}
.no-data {
  padding: 2rem;
  text-align: center;
  color: #999;
}
</style>
<div id="chart-root"></div>
<script id="vega-spec" type="application/json">{{VEGA_SPEC}}</script>
<script type="module">
import embed from 'https://esm.sh/vega-embed@6'

const root = document.getElementById('chart-root')
const specEl = document.getElementById('vega-spec')

try {
  const spec = JSON.parse(specEl.textContent)
  spec.width = 'container'
  spec.height = 'container'
  spec.autosize = { type: 'fit', contains: 'padding' }

  // Detect dark mode from host or media query
  const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
  const theme = prefersDark ? 'dark' : undefined

  embed(root, spec, {
    actions: { export: true, source: false, compiled: false, editor: false },
    theme,
  }).catch(err => {
    root.innerHTML = `<div class="error">Chart render error: ${err.message}</div>`
  })

  // Resize on container changes
  const ro = new ResizeObserver(() => {
    const view = root.querySelector('.vega-embed')?.__vega_view
    if (view) view.resize().run()
  })
  ro.observe(root)
} catch (err) {
  root.innerHTML = `<div class="error">Invalid chart data: ${err.message}</div>`
}
</script>
