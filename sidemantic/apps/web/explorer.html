<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="../../widget/static/widget.css">
  <style>
    html, body { margin: 0; padding: 0; background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #explorer { width: 100%; min-height: 600px; position: relative; }
    .loading { padding: 2rem; text-align: center; color: #999; }
    .error { padding: 2rem; text-align: center; color: #dc2626; }
    .expand-btn {
      text-align: right; padding: 6px 12px; cursor: pointer;
      color: #666; font-size: 13px; transition: color 0.2s;
    }
    .expand-btn:hover { color: #333; }
    @media (prefers-color-scheme: dark) {
      .expand-btn { color: #999; }
      .expand-btn:hover { color: #ddd; background: rgba(255,255,255,0.1); }
    }
    html.fullscreen, html.fullscreen body { height: 100%; }
    html.fullscreen #explorer { height: calc(100% - 150px); min-height: auto; }
    html.fullscreen { padding: 16px 24px 0; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="explorer">
    <div class="loading">Loading...</div>
  </div>
  <script type="module" src="./explorer-app.ts"></script>
</body>
</html>
