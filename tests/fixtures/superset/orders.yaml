table_name: orders
main_dttm_col: created_at
description: Customer orders dataset
schema: public
sql: null
cache_timeout: null
filter_select_enabled: true
currency_code_column: currency_code
version: 1.0.0

folders:
  - uuid: 11111111-1111-1111-1111-111111111111
    type: folder
    name: Revenue
    description: Revenue metrics
    children:
      - uuid: 22222222-2222-2222-2222-222222222222
        type: metric
        name: total_revenue
  - uuid: 33333333-3333-3333-3333-333333333333
    type: folder
    name: Attributes
    children:
      - uuid: 44444444-4444-4444-4444-444444444444
        type: column
        name: status

metrics:
  - metric_name: count
    verbose_name: COUNT(*)
    metric_type: count
    expression: COUNT(*)
    description: Total number of orders
    d3format: null
    extra: null
    warning_text: null

  - metric_name: total_revenue
    verbose_name: Total Revenue
    metric_type: sum
    expression: SUM(amount)
    description: Sum of order amounts
    d3format: "$,.2f"
    currency:
      symbol: USD
      symbolPosition: prefix
    extra: null
    warning_text: Excludes refunded orders

  - metric_name: avg_order_value
    verbose_name: Average Order Value
    metric_type: avg
    expression: AVG(amount)
    description: Average order amount
    d3format: "$,.2f"
    extra: null
    warning_text: null

columns:
  - column_name: id
    verbose_name: Order ID
    is_dttm: false
    is_active: true
    type: VARCHAR
    groupby: true
    filterable: true
    expression: null
    description: Primary key

  - column_name: customer_id
    verbose_name: Customer ID
    is_dttm: false
    is_active: true
    type: VARCHAR
    advanced_data_type: internet_address
    groupby: true
    filterable: true
    expression: null
    description: Foreign key to customers

  - column_name: created_at
    verbose_name: Order Date
    is_dttm: true
    is_active: true
    type: TIMESTAMP WITHOUT TIME ZONE
    groupby: true
    filterable: true
    expression: null
    description: Order creation timestamp
    python_date_format: "%Y-%m-%d %H:%M:%S"
    datetime_format: "%Y-%m-%dT%H:%M:%S"

  - column_name: status
    verbose_name: Order Status
    is_dttm: false
    is_active: true
    type: VARCHAR
    groupby: true
    filterable: true
    expression: null
    description: Current order status

  - column_name: amount
    verbose_name: Order Amount
    is_dttm: false
    is_active: true
    type: NUMERIC
    groupby: false
    filterable: true
    expression: null
    description: Order total amount
