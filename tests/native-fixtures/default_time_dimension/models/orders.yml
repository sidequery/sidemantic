version: 1

models:
  - name: orders
    table: orders
    primary_key: order_id
    default_time_dimension: created_at
    default_grain: month
    dimensions:
      - name: order_id
        type: numeric
      - name: created_at
        type: time
        sql: created_at
        granularity: day
        supported_granularities: [day, week, month, quarter, year]
    metrics:
      - name: total_revenue
        agg: sum
        sql: amount
