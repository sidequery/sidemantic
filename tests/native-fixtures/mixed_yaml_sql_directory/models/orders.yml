version: 1

models:
  - name: orders
    table: orders
    primary_key: order_id
    relationships:
      - name: customers
        type: many_to_one
        foreign_key: customer_id
        primary_key: customer_id
    dimensions:
      - name: order_id
        type: numeric
      - name: customer_id
        type: numeric
    metrics:
      - name: total_revenue
        agg: sum
        sql: amount
