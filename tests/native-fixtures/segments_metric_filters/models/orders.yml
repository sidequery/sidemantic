version: 1

models:
  - name: orders
    table: orders
    primary_key: order_id
    dimensions:
      - name: order_id
        type: numeric
      - name: status
        type: categorical
      - name: amount
        type: numeric
    segments:
      - name: high_value
        sql: "{model}.amount >= 100"
    metrics:
      - name: total_revenue
        agg: sum
        sql: amount
      - name: completed_revenue
        agg: sum
        sql: amount
        filters:
          - "{model}.status = 'completed'"
